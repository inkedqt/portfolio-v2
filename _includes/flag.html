<div class="qa-item">
  <div class="qa-question-text">{{ include.question }}</div>
  <div class="flag-reveal">
    <input type="checkbox">
    <span class="r-placeholder">Click flag to reveal</span>
    <span class="r-answer">{{ include.answer }}</span>
    <button class="copy-btn" onclick="event.stopPropagation();navigator.clipboard.writeText('{{ include.answer }}');this.textContent='copied';setTimeout(()=>this.textContent='copy',1500)">copy</button>
  </div>
</div>
